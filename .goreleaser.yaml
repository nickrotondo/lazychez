version: 2

builds:
  - main: .
    binary: lazychez
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

homebrew_casks:
  - name: lazychez
    repository:
      owner: nickrotondo
      name: homebrew-tap
    homepage: https://github.com/nickrotondo/lazychez
    description: A terminal UI for managing chezmoi dotfiles with integrated git operations

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
