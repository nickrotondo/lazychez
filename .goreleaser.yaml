version: 2

builds:
  - main: .
    binary: lazychez
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: nickrotondo
      name: homebrew-tap
    homepage: https://github.com/nickrotondo/lazychez
    description: A terminal UI for managing chezmoi dotfiles with integrated git operations
    license: MIT
    install: |
      bin.install "lazychez"
    test: |
      assert_match version, shell_output("#{bin}/lazychez --version", 2)

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
